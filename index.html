<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Chronicle Top 100 Restaurants 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div>
    <h1><span>Top 100</span> Best Restaurants · Bay Area 2026</h1>
    <div class="subtitle">San Francisco Chronicle · Updated April 2026</div>
  </div>
  <div class="header-right">
    100 restaurants · 19 cities<br>
    <a href="https://www.sfchronicle.com/projects/2026/top-100-best-restaurants-san-francisco-bay-area/" target="_blank">View original ↗</a>
  </div>
</header>

<div class="app">
  <div class="sidebar">

    <div class="filters">
      <input class="search-box" type="text" id="search" placeholder="Search restaurants, cuisine, city...">

      <div class="filters-row">
        <div class="filter-group">
          <label for="filter-location">Region</label>
          <select id="filter-location">
            <option value="">All regions</option>
            <option value="San Francisco">San Francisco</option>
            <option value="East Bay">East Bay</option>
            <option value="North Bay">North Bay</option>
            <option value="Peninsula">Peninsula</option>
            <option value="South Bay">South Bay</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-city">City</label>
          <select id="filter-city">
            <option value="">All cities</option>
            <option value="Alameda">Alameda</option>
            <option value="Berkeley">Berkeley</option>
            <option value="Concord">Concord</option>
            <option value="Fremont">Fremont</option>
            <option value="Geyserville">Geyserville</option>
            <option value="Healdsburg">Healdsburg</option>
            <option value="Menlo Park">Menlo Park</option>
            <option value="Napa">Napa</option>
            <option value="Oakland">Oakland</option>
            <option value="Petaluma">Petaluma</option>
            <option value="San Anselmo">San Anselmo</option>
            <option value="San Bruno">San Bruno</option>
            <option value="San Francisco">San Francisco</option>
            <option value="San Jose">San Jose</option>
            <option value="San Rafael">San Rafael</option>
            <option value="Santa Clara">Santa Clara</option>
            <option value="Sebastopol">Sebastopol</option>
            <option value="Sonoma">Sonoma</option>
            <option value="St. Helena">St. Helena</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-price">Price</label>
          <select id="filter-price">
            <option value="">Any price</option>
            <option value="$">$ (Cheap eats)</option>
            <option value="$$">$$ (Moderate)</option>
            <option value="$$$">$$$ (Pricey)</option>
            <option value="$$$$">$$$$ (Splurge)</option>
          </select>
        </div>
      </div>

      <div class="filters-row">
        <div class="filter-group" style="flex: 2;">
          <label for="filter-cuisine">Cuisine</label>
          <select id="filter-cuisine">
            <option value="">All cuisines</option>
            <option value="American">American</option>
            <option value="Asian American bakery">Asian American bakery</option>
            <option value="Asian American deli">Asian American deli</option>
            <option value="Burgers">Burgers</option>
            <option value="Café">Café</option>
            <option value="Californian">Californian</option>
            <option value="Cambodian">Cambodian</option>
            <option value="Cantonese">Cantonese</option>
            <option value="Chamorro">Chamorro</option>
            <option value="Chinese">Chinese</option>
            <option value="Eritrean">Eritrean</option>
            <option value="Ethiopian">Ethiopian</option>
            <option value="Filipino">Filipino</option>
            <option value="Fine dining">Fine dining</option>
            <option value="French">French</option>
            <option value="French wine bar">French wine bar</option>
            <option value="Indian">Indian</option>
            <option value="Indonesian-Texas barbecue">Indonesian-Texas barbecue</option>
            <option value="Italian">Italian</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="Korean Taiwanese">Korean Taiwanese</option>
            <option value="Laotian">Laotian</option>
            <option value="Lebanese">Lebanese</option>
            <option value="Malaysian">Malaysian</option>
            <option value="Mediterranean">Mediterranean</option>
            <option value="Mexican">Mexican</option>
            <option value="Mexican deli">Mexican deli</option>
            <option value="Middle Eastern">Middle Eastern</option>
            <option value="Moroccan">Moroccan</option>
            <option value="NOLA sandwiches">NOLA sandwiches</option>
            <option value="Pakistani">Pakistani</option>
            <option value="Pizza">Pizza</option>
            <option value="Salvadoran">Salvadoran</option>
            <option value="Seafood">Seafood</option>
            <option value="Somali">Somali</option>
            <option value="Soul food">Soul food</option>
            <option value="South Indian">South Indian</option>
            <option value="Steakhouse">Steakhouse</option>
            <option value="Sushi">Sushi</option>
            <option value="Thai">Thai</option>
            <option value="Turkish">Turkish</option>
            <option value="Uyghur">Uyghur</option>
            <option value="Vegan Sushi">Vegan Sushi</option>
            <option value="Vietnamese">Vietnamese</option>
            <option value="Wine bar">Wine bar</option>
          </select>
        </div>
      </div>

      <div class="filter-tags">
        <span style="font-size:0.7rem;color:var(--muted);line-height:24px;">Sort:</span>
        <button class="sort-btn active" data-sort="rank">Rank</button>
        <button class="sort-btn" data-sort="name">A–Z</button>
        <button class="sort-btn" data-sort="price-asc">$ first</button>
        <button class="sort-btn" data-sort="price-desc">$$$$ first</button>
      </div>
    </div>

    <div class="results-count" id="results-count">Showing 100 restaurants</div>
    <div class="nearby-notice" id="nearby-notice"></div>
    <div class="list" id="list"></div>

  </div>

  <div class="map-container">
    <div id="map"></div>
    <div class="map-legend">
      <div style="font-weight:bold;margin-bottom:5px;font-size:0.73rem;">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2c2c2c;border:2px solid #c9a84c;"></div> #1–3</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c9a84c;"></div> #4–10</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b1a1a;"></div> #11–100</div>
    </div>
  </div>
</div>

<div class="charts-section">
  <div class="chart-card">
    <div class="chart-title">By Region</div>
    <div class="chart-subtitle">Where are the restaurants?</div>
    <div class="chart-wrap"><canvas id="chart-region"></canvas></div>
    <div class="chart-note" id="chart-region-note"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">By Price</div>
    <div class="chart-subtitle">How much will it cost?</div>
    <div class="chart-wrap"><canvas id="chart-price"></canvas></div>
    <div class="chart-note" id="chart-price-note"></div>
  </div>
  <div class="chart-card" style="flex:2;min-width:340px;">
    <div class="chart-title">By Cuisine</div>
    <div class="chart-subtitle">Top food types represented</div>
    <div class="chart-wrap" style="min-height:420px;"><canvas id="chart-cuisine"></canvas></div>
    <div class="chart-note" id="chart-cuisine-note"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>

<!-- Gradient AI chatbot -->
<script async
  src="https://e3evtpfq2ehlobf6trw7k3kk.agents.do-ai.run/static/chatbot/widget.js"
  data-agent-id="047e2c87-339a-11f1-b074-4e013e2ddde4"
  data-chatbot-id="msSGv16GoOwsVS8D_AnR5VxUKukZ4Tgn"
  data-name="SF Chronicle Restaurant Guide"
  data-primary-color="#1a1a1a"
  data-secondary-color="#f8f4ee"
  data-button-background-color="#c9a84c"
  data-starting-message="Ask me anything about the SF Chronicle's Top 100 Bay Area restaurants — best spots by neighborhood, what cuisine to try, hidden gems, price ranges, and more."
  data-logo="/static/chatbot/icons/default-agent.svg">
</script>

<style>
  /* ── Chatbot widget overrides ── */

  /* Launch button */
  #gradient-chatbot-button,
  [id*="chatbot"] button[class*="launcher"],
  div[class*="chatbot-launcher"],
  div[class*="chat-launcher"] {
    width: 52px !important;
    height: 52px !important;
    border-radius: 50% !important;
    background: #1a1a1a !important;
    border: 2px solid #c9a84c !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 0 rgba(201,168,76,0) !important;
    transition: box-shadow 0.3s ease, transform 0.2s ease !important;
    bottom: 24px !important;
    right: 24px !important;
  }

  #gradient-chatbot-button:hover,
  div[class*="chatbot-launcher"]:hover,
  div[class*="chat-launcher"]:hover {
    transform: scale(1.08) !important;
    box-shadow: 0 6px 28px rgba(0,0,0,0.6), 0 0 0 6px rgba(201,168,76,0.15) !important;
  }

  /* Chat window */
  div[class*="chatbot-window"],
  div[class*="chat-window"],
  #gradient-chatbot-window {
    border-radius: 12px !important;
    border: 1px solid #c9a84c !important;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6) !important;
    overflow: hidden !important;
    font-family: 'Georgia', serif !important;
  }

  /* Header bar */
  div[class*="chatbot-header"],
  div[class*="chat-header"] {
    background: #1a1a1a !important;
    border-bottom: 2px solid #c9a84c !important;
    padding: 12px 16px !important;
    font-family: 'Georgia', serif !important;
    font-size: 0.9rem !important;
    letter-spacing: 0.04em !important;
  }

  /* Send button */
  div[class*="chatbot"] button[class*="send"],
  div[class*="chat"] button[class*="send"] {
    background: #c9a84c !important;
    border-radius: 6px !important;
    transition: opacity 0.15s !important;
  }
  div[class*="chatbot"] button[class*="send"]:hover,
  div[class*="chat"] button[class*="send"]:hover {
    opacity: 0.85 !important;
  }

  /* Input area */
  div[class*="chatbot"] input[type="text"],
  div[class*="chatbot"] textarea,
  div[class*="chat"] input[type="text"],
  div[class*="chat"] textarea {
    font-family: 'Georgia', serif !important;
    font-size: 0.85rem !important;
    border-radius: 6px !important;
  }

  /* Bot message bubbles */
  div[class*="chatbot"] div[class*="bot-message"],
  div[class*="chatbot"] div[class*="assistant"],
  div[class*="chat"] div[class*="bot-message"] {
    background: #f8f4ee !important;
    border-radius: 8px 8px 8px 2px !important;
    font-family: 'Georgia', serif !important;
    font-size: 0.85rem !important;
    line-height: 1.5 !important;
    color: #1a1a1a !important;
  }

  /* User message bubbles */
  div[class*="chatbot"] div[class*="user-message"],
  div[class*="chatbot"] div[class*="human"],
  div[class*="chat"] div[class*="user-message"] {
    background: #1a1a1a !important;
    color: #c9a84c !important;
    border-radius: 8px 8px 2px 8px !important;
    font-family: 'Georgia', serif !important;
    font-size: 0.85rem !important;
  }
</style>
</body>
</html>
